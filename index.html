<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Prayer Times</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a3e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Amiri:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #0f1729 0%, #1a1a3e 40%, #2d1b4e 70%, #1a1a3e 100%);
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  .header {
    text-align: center;
    margin: 20px 0 10px;
  }

  .header h1 {
    font-family: 'Amiri', serif;
    font-size: 2.4rem;
    font-weight: 700;
    background: linear-gradient(135deg, #f0c27f, #e8d5b7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header .arabic {
    font-family: 'Amiri', serif;
    font-size: 1.6rem;
    color: #c9a96e;
    margin-top: 4px;
  }

  .location {
    font-size: 0.85rem;
    color: #8a8ab0;
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
    justify-content: center;
  }

  .location svg { width: 14px; height: 14px; fill: #8a8ab0; }

  .date-bar {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 16px 0;
    font-size: 0.85rem;
    color: #9a9abf;
  }

  .next-prayer-card {
    background: linear-gradient(135deg, rgba(201, 169, 110, 0.15), rgba(201, 169, 110, 0.05));
    border: 1px solid rgba(201, 169, 110, 0.25);
    border-radius: 20px;
    padding: 28px 40px;
    text-align: center;
    width: 100%;
    max-width: 420px;
    margin-bottom: 24px;
    backdrop-filter: blur(10px);
  }

  .next-prayer-card .label {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #c9a96e;
    margin-bottom: 6px;
  }

  .next-prayer-card .prayer-name {
    font-family: 'Amiri', serif;
    font-size: 2rem;
    font-weight: 700;
    color: #f0d9a0;
  }

  .next-prayer-card .countdown {
    font-size: 3rem;
    font-weight: 300;
    letter-spacing: 4px;
    margin: 10px 0 6px;
    font-variant-numeric: tabular-nums;
    color: #fff;
  }

  .next-prayer-card .time-at {
    font-size: 0.9rem;
    color: #9a9abf;
  }

  .progress-bar-container {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    margin-top: 16px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #c9a96e, #f0d9a0);
    border-radius: 2px;
    transition: width 1s linear;
  }

  .prayers-grid {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .prayer-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 14px;
    transition: all 0.3s ease;
  }

  .prayer-row.active {
    background: rgba(201, 169, 110, 0.12);
    border-color: rgba(201, 169, 110, 0.3);
    box-shadow: 0 0 20px rgba(201, 169, 110, 0.08);
  }

  .prayer-row.passed {
    opacity: 0.4;
  }

  .prayer-row .left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .prayer-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    background: rgba(255,255,255,0.06);
  }

  .prayer-row.active .prayer-icon {
    background: rgba(201, 169, 110, 0.2);
  }

  .prayer-info .name {
    font-weight: 600;
    font-size: 0.95rem;
  }

  .prayer-info .arabic-name {
    font-family: 'Amiri', serif;
    font-size: 0.8rem;
    color: #8a8ab0;
  }

  .prayer-row .time {
    font-size: 1.05rem;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }

  .prayer-row.active .time {
    color: #f0d9a0;
  }

  .settings-bar {
    margin-top: 24px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .settings-bar select, .settings-bar button {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: #ccc;
    padding: 8px 14px;
    border-radius: 10px;
    font-size: 0.8rem;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }

  .settings-bar select:hover, .settings-bar button:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(201, 169, 110, 0.3);
  }

  .settings-bar select option { background: #1a1a3e; }

  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    gap: 16px;
  }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(201, 169, 110, 0.2);
    border-top-color: #c9a96e;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    text-align: center;
    color: #e88;
    margin: 20px;
    font-size: 0.9rem;
  }

  @media (max-width: 480px) {
    .next-prayer-card { padding: 22px 24px; }
    .next-prayer-card .countdown { font-size: 2.4rem; }
    .header h1 { font-size: 1.8rem; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Prayer Times</h1>
  <div class="arabic">مواقيت الصلاة</div>
  <div class="location" id="location">
    <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/></svg>
    <span>Detecting location...</span>
  </div>
</div>

<div class="date-bar" id="dateBar"></div>

<div id="app">
  <div class="loading">
    <div class="spinner"></div>
    <div style="color:#8a8ab0; font-size:0.9rem;">Calculating prayer times...</div>
  </div>
</div>

<div class="settings-bar">
  <select id="calcMethod" title="Calculation Method">
    <option value="MWL">Muslim World League</option>
    <option value="ISNA">ISNA (North America)</option>
    <option value="Egypt">Egyptian Authority</option>
    <option value="Makkah">Umm al-Qura (Makkah)</option>
    <option value="Karachi">Karachi</option>
    <option value="Tehran">Tehran</option>
    <option value="Diyanet" selected>Diyanet (Turkey)</option>
  </select>
  <select id="asrMethod" title="Asr Calculation">
    <option value="Standard">Asr: Shafi'i</option>
    <option value="Hanafi">Asr: Hanafi</option>
  </select>
</div>

<script>
// ─── Prayer Time Calculation Engine ───
const DEG = Math.PI / 180;
const RAD = 180 / Math.PI;

const METHODS = {
  MWL:     { fajr: 18, isha: 17 },
  ISNA:    { fajr: 15, isha: 15 },
  Egypt:   { fajr: 19.5, isha: 17.5 },
  Makkah:  { fajr: 18.5, isha: '90 min' },
  Karachi: { fajr: 18, isha: 18 },
  Tehran:  { fajr: 17.7, isha: 14 },
  Diyanet: { fajr: 18, isha: 17 },
};

const PRAYER_META = [
  { key: 'fajr',    name: 'Fajr',    arabic: 'الفجر',   icon: '🌙' },
  { key: 'sunrise', name: 'Sunrise',  arabic: 'الشروق',  icon: '🌅' },
  { key: 'dhuhr',   name: 'Dhuhr',   arabic: 'الظهر',   icon: '☀️' },
  { key: 'asr',     name: 'Asr',     arabic: 'العصر',   icon: '🌤' },
  { key: 'maghrib', name: 'Maghrib', arabic: 'المغرب',  icon: '🌇' },
  { key: 'isha',    name: 'Isha',    arabic: 'العشاء',  icon: '🌑' },
];

function julianDate(y, m, d) {
  if (m <= 2) { y--; m += 12; }
  const A = Math.floor(y / 100);
  const B = 2 - A + Math.floor(A / 4);
  return Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (m + 1)) + d + B - 1524.5;
}

function sunPosition(jd) {
  const D = jd - 2451545.0;
  const g = (357.529 + 0.98560028 * D) % 360;
  const q = (280.459 + 0.98564736 * D) % 360;
  const L = (q + 1.915 * Math.sin(g * DEG) + 0.020 * Math.sin(2 * g * DEG)) % 360;
  const e = 23.439 - 0.00000036 * D;
  const RA = Math.atan2(Math.cos(e * DEG) * Math.sin(L * DEG), Math.cos(L * DEG)) * RAD / 15;
  const decl = Math.asin(Math.sin(e * DEG) * Math.sin(L * DEG)) * RAD;
  const EqT = q / 15 - fixHour(RA);
  return { decl, EqT };
}

function fixHour(a) {
  a = a - 24 * Math.floor(a / 24);
  return a < 0 ? a + 24 : a;
}

function computePrayerTimes(date, lat, lng, method, asrJuristic) {
  const y = date.getFullYear(), m = date.getMonth() + 1, d = date.getDate();
  const jd = julianDate(y, m, d);
  const tz = -date.getTimezoneOffset() / 60;
  const { decl, EqT } = sunPosition(jd + 0.5);

  const dhuhr = fixHour(12 + tz - lng / 15 - EqT);

  function sunAngleTime(angle, isCCW) {
    const cosHA = (Math.sin(-angle * DEG) - Math.sin(lat * DEG) * Math.sin(decl * DEG))
                / (Math.cos(lat * DEG) * Math.cos(decl * DEG));
    if (cosHA > 1 || cosHA < -1) return NaN;
    const HA = Math.acos(cosHA) * RAD / 15;
    return dhuhr + (isCCW ? -HA : HA);
  }

  function asrTime(factor) {
    const d2 = decl;
    const a = Math.atan(1 / (factor + Math.tan(Math.abs(lat - d2) * DEG))) * RAD;
    return sunAngleTime(-a, false);
  }

  const params = METHODS[method];
  const asrFactor = asrJuristic === 'Hanafi' ? 2 : 1;

  const fajr = sunAngleTime(params.fajr, true);
  const sunrise = sunAngleTime(0.833, true);
  const asr = asrTime(asrFactor);
  const maghrib = sunAngleTime(0.833, false);

  let isha;
  if (typeof params.isha === 'string') {
    const mins = parseInt(params.isha);
    isha = maghrib + mins / 60;
  } else {
    isha = sunAngleTime(params.isha, false);
  }

  function toTimeStr(hours) {
    if (isNaN(hours)) return '--:--';
    hours = fixHour(hours);
    const h = Math.floor(hours);
    const min = Math.round((hours - h) * 60);
    return `${String(h).padStart(2, '0')}:${String(min).padStart(2, '0')}`;
  }

  function toDate(hours) {
    if (isNaN(hours)) return null;
    hours = fixHour(hours);
    const h = Math.floor(hours);
    const min = Math.round((hours - h) * 60);
    const d = new Date(date);
    d.setHours(h, min, 0, 0);
    return d;
  }

  return {
    fajr:    { str: toTimeStr(fajr),    date: toDate(fajr) },
    sunrise: { str: toTimeStr(sunrise),  date: toDate(sunrise) },
    dhuhr:   { str: toTimeStr(dhuhr),   date: toDate(dhuhr) },
    asr:     { str: toTimeStr(asr),     date: toDate(asr) },
    maghrib: { str: toTimeStr(maghrib), date: toDate(maghrib) },
    isha:    { str: toTimeStr(isha),    date: toDate(isha) },
  };
}

// ─── Hijri Date (Approximation) ───
function toHijri(date) {
  const jd = julianDate(date.getFullYear(), date.getMonth() + 1, date.getDate());
  const l = Math.floor(jd - 1948439.5) + 10632;
  const n = Math.floor((l - 1) / 10631);
  const l2 = l - 10631 * n + 354;
  const j = Math.floor((10985 - l2) / 5316) * Math.floor((50 * l2) / 17719)
          + Math.floor(l2 / 5670) * Math.floor((43 * l2) / 15238);
  const l3 = l2 - Math.floor((30 - j) / 15) * Math.floor((17719 * j) / 50)
           - Math.floor(j / 16) * Math.floor((15238 * j) / 43) + 29;
  const m = Math.floor((24 * l3) / 709);
  const d = l3 - Math.floor((709 * m) / 24);
  const y = 30 * n + j - 30;
  const months = ['Muharram','Safar','Rabi al-Awwal','Rabi al-Thani','Jumada al-Ula',
    'Jumada al-Thani','Rajab','Sha\'ban','Ramadan','Shawwal','Dhul Qi\'dah','Dhul Hijjah'];
  return `${d} ${months[m - 1]} ${y} AH`;
}

// ─── App State & Rendering ───
let state = { lat: null, lng: null, city: '', times: null };

function getNext(times) {
  const now = new Date();
  for (const p of PRAYER_META) {
    if (times[p.key].date && times[p.key].date > now) return p.key;
  }
  return null;
}

function getPrev(times, nextKey) {
  const idx = PRAYER_META.findIndex(p => p.key === nextKey);
  return idx > 0 ? PRAYER_META[idx - 1].key : PRAYER_META[PRAYER_META.length - 1].key;
}

function formatCountdown(ms) {
  if (ms <= 0) return '00:00:00';
  const s = Math.floor(ms / 1000);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
}

function render() {
  if (!state.times) return;
  const times = state.times;
  const nextKey = getNext(times);
  const now = new Date();

  let nextPrayer, countdown, progressPct = 0, timeAtStr = '';
  if (nextKey) {
    const meta = PRAYER_META.find(p => p.key === nextKey);
    nextPrayer = meta;
    const diff = times[nextKey].date - now;
    countdown = formatCountdown(diff);
    timeAtStr = `at ${times[nextKey].str}`;

    const prevKey = getPrev(times, nextKey);
    const prevTime = times[prevKey].date;
    const totalSpan = times[nextKey].date - prevTime;
    if (totalSpan > 0) progressPct = Math.min(100, ((now - prevTime) / totalSpan) * 100);
  } else {
    nextPrayer = { name: 'Fajr', arabic: 'الفجر', icon: '🌙', key: 'fajr' };
    countdown = '--:--:--';
    timeAtStr = 'tomorrow';
  }

  let html = `
    <div class="next-prayer-card">
      <div class="label">Next Prayer</div>
      <div class="prayer-name">${nextPrayer.icon} ${nextPrayer.name}</div>
      <div class="countdown">${countdown}</div>
      <div class="time-at">${timeAtStr}</div>
      <div class="progress-bar-container">
        <div class="progress-bar" style="width:${progressPct}%"></div>
      </div>
    </div>
    <div class="prayers-grid">
  `;

  let passedNext = false;
  for (const p of PRAYER_META) {
    const isActive = p.key === nextKey;
    const isPassed = !isActive && !passedNext && nextKey !== null;
    if (isActive) passedNext = true;

    const cls = isActive ? 'active' : (isPassed ? 'passed' : '');
    html += `
      <div class="prayer-row ${cls}">
        <div class="left">
          <div class="prayer-icon">${p.icon}</div>
          <div class="prayer-info">
            <div class="name">${p.name}</div>
            <div class="arabic-name">${p.arabic}</div>
          </div>
        </div>
        <div class="time">${times[p.key].str}</div>
      </div>
    `;
  }

  html += '</div>';
  document.getElementById('app').innerHTML = html;
}

function updateDates() {
  const now = new Date();
  const greg = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  const hijri = toHijri(now);
  document.getElementById('dateBar').innerHTML = `<span>${greg}</span><span>|</span><span>${hijri}</span>`;
}

function recalculate() {
  if (!state.lat) return;
  const method = document.getElementById('calcMethod').value;
  const asr = document.getElementById('asrMethod').value;
  state.times = computePrayerTimes(new Date(), state.lat, state.lng, method, asr);
  render();
}

// ─── Geolocation & Reverse Geocode ───
async function reverseGeocode(lat, lng) {
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&zoom=10`);
    const data = await res.json();
    const addr = data.address || {};
    return addr.city || addr.town || addr.village || addr.county || data.display_name?.split(',')[0] || 'Unknown';
  } catch {
    return `${lat.toFixed(2)}, ${lng.toFixed(2)}`;
  }
}

async function init() {
  updateDates();

  if (!navigator.geolocation) {
    document.getElementById('app').innerHTML = '<div class="error-msg">Geolocation is not supported by your browser.</div>';
    return;
  }

  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      state.lat = pos.coords.latitude;
      state.lng = pos.coords.longitude;

      const city = await reverseGeocode(state.lat, state.lng);
      state.city = city;
      document.getElementById('location').innerHTML = `
        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/></svg>
        <span>${city} (${state.lat.toFixed(2)}°, ${state.lng.toFixed(2)}°)</span>
      `;

      recalculate();
      setInterval(() => { render(); }, 1000);
      setInterval(updateDates, 60000);
    },
    (err) => {
      // Fallback to Istanbul
      state.lat = 41.0082;
      state.lng = 28.9784;
      state.city = 'Istanbul (default)';
      document.getElementById('location').innerHTML = `
        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/></svg>
        <span>Istanbul (default - allow location for accuracy)</span>
      `;
      recalculate();
      setInterval(() => { render(); }, 1000);
    }
  );
}

document.getElementById('calcMethod').addEventListener('change', recalculate);
document.getElementById('asrMethod').addEventListener('change', recalculate);

init();

// ─── PWA Service Worker ───
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
